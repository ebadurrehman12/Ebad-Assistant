name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check .

      - name: Train churn model (synthetic smoke test)
        run: |
          python churn_project.py

      - name: Run batch prediction script
        run: |
          python predict_churn.py --input sample_new_customers.csv

      - name: Verify expected artifacts
        run: |
          test -f artifacts/churn_model.joblib
          test -f artifacts/results.json
          test -f artifacts/new_customer_predictions.csv
